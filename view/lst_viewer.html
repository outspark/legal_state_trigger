<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LST Universal Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/vis-timeline@7.7.2/standalone/umd/vis-timeline-graph2d.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/vis-timeline@7.7.2/dist/vis-timeline-graph2d.min.css">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0D1117;
      color: #C9D1D9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Drop Zone Overlay ── */
    #drop-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(13, 17, 23, 0.95);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 4px dashed #30363D;
      margin: 20px;
      border-radius: 20px;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    #drop-overlay.dragover {
      background: rgba(88, 166, 255, 0.1);
      border-color: #58A6FF;
    }

    #drop-overlay h2 {
      font-size: 1.5rem;
      margin-bottom: 10px;
      color: #E6EDF3;
    }

    #drop-overlay p {
      color: #8B949E;
      margin-bottom: 20px;
    }

    .upload-btn {
      background: #238636;
      color: white;
      padding: 10px 24px;
      border-radius: 6px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .upload-btn:hover {
      background: #2ea043;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #161B22 0%, #1C2333 100%);
      border-bottom: 1px solid #30363D;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 10;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      background: linear-gradient(90deg, #58A6FF, #BC8CFF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .re-upload {
      margin-left: 20px;
      background: #21262D;
      border: 1px solid #30363D;
      color: #C9D1D9;
      padding: 5px 12px;
      border-radius: 5px;
      font-size: 0.75rem;
      cursor: pointer;
    }

    /* ── Layout ── */
    #main-content {
      display: grid;
      grid-template-columns: 320px 1fr;
      flex: 1;
      height: calc(100vh - 60px);
      visibility: hidden;
      /* Only show after load */
    }

    /* ── Sidebar ── */
    aside {
      background: #161B22;
      border-right: 1px solid #30363D;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 20px;
      gap: 18px;
    }

    .card {
      background: #1C2333;
      border: 1px solid #30363D;
      border-radius: 10px;
      padding: 16px;
    }

    .card h2 {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      color: #8B949E;
      margin-bottom: 12px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      padding: 5px 0;
      border-bottom: 1px solid #21262D;
    }

    .stat-val {
      font-weight: 600;
      color: #E6EDF3;
    }

    .score-bar-wrap {
      background: #21262D;
      border-radius: 6px;
      height: 10px;
      margin: 10px 0;
      overflow: hidden;
    }

    #score-bar {
      height: 100%;
      width: 0%;
      transition: width 0.6s ease;
    }

    /* ── Timeline ── */
    #graph-wrap {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      max-width: 100%;
      max-height: calc(100vh - 60px);
    }

    #mytimeline {
      flex: 1;
      min-height: 300px;
      background: #0D1117;
      overflow: visible;
    }

    /* vis-timeline 다크 테마 */
    #mytimeline .vis-timeline { border-color: #30363D; }
    #mytimeline .vis-panel.vis-background { background: #161B22; }
    #mytimeline .vis-panel.vis-center { border-color: #30363D; }
    #mytimeline .vis-item { background: #21262D; border-color: #58A6FF; color: #C9D1D9; }
    #mytimeline .vis-item.vis-selected { border-color: #F4D03F; }
    #mytimeline .vis-label { background: #161B22; border-color: #30363D; color: #8B949E; }
    #mytimeline .vis-time-axis .vis-text { color: #8B949E; }
    #mytimeline .vis-grid.vis-vertical { border-color: #21262D; }

    /* ── Info Panel (S0/S1) ── */
    #node-detail {
      background: #161B22;
      border-top: 1px solid #30363D;
      padding: 14px 20px;
      font-size: 0.8rem;
      min-height: 140px;
      max-height: 280px;
      overflow-y: auto;
      color: #8B949E;
    }

    #node-detail .detail-section { margin-bottom: 12px; }
    #node-detail .detail-label { font-size: 0.7rem; font-weight: 600; color: #58A6FF; margin-bottom: 4px; }
    #node-detail .detail-text { color: #C9D1D9; line-height: 1.5; }

    #node-detail .field {
      margin-bottom: 4px;
    }

    #node-detail .field b {
      color: #C9D1D9;
    }

    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .badge-Accepted {
      background: #1A4731;
      color: #27AE60;
    }

    .badge-Contested {
      background: #3D3117;
      color: #F4D03F;
    }

    .badge-Refuted {
      background: #3D1717;
      color: #E74C3C;
    }

    #mytimeline .vis-item.conflict-item {
      border-color: #E74C3C !important;
      background: #3D1717 !important;
    }

    .conflict-alert {
      background: #3D1717;
      border: 1px solid #E74C3C;
      border-radius: 6px;
      padding: 8px 12px;
      color: #E74C3C;
      font-weight: 600;
      margin-bottom: 10px;
      font-size: 0.8rem;
    }

    .conflict-detail {
      color: #C9D1D9;
      font-size: 0.78rem;
      margin-bottom: 6px;
      padding-left: 12px;
      border-left: 2px solid #E74C3C;
      line-height: 1.5;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: #30363D;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <div id="drop-overlay" onclick="document.getElementById('file-input').click()">
    <h2>LST 리서치 결과 시각화</h2>
    <p><code>lst_analysis_result.json</code> 파일을 여기에 드래그하거나 클릭하여 열기</p>
    <button class="upload-btn">파일 선택</button>
    <input type="file" id="file-input" style="display:none" accept=".json" />
  </div>

  <header>
    <h1>LST Universal Viewer</h1>
    <button class="re-upload" onclick="document.getElementById('file-input').click()">다른 JSON 열기</button>
    <div style="margin-left: auto; font-size: 0.75rem; color: #6E7681;" id="run-ts"></div>
  </header>

  <div id="main-content">
    <aside>
      <div class="card">
        <h2>📊 분석 요약</h2>
        <div class="stat-row"><span>총 LST 노드</span><span class="stat-val" id="count-lst">-</span></div>
        <div class="stat-row"><span>조립된 노드</span><span class="stat-val" id="count-nodes">-</span></div>
        <div class="stat-row"><span>고유 사건</span><span class="stat-val" id="count-unique">-</span></div>
      </div>
      <div class="card">
        <h2>⚖️ 고의성 판결</h2>
        <div class="stat-row"><span>점수</span><span class="stat-val" id="intent-score">-</span></div>
        <div class="stat-row"><span>유형</span><span class="stat-val" id="intent-type">-</span></div>
        <div class="score-bar-wrap">
          <div id="score-bar"></div>
        </div>
        <div id="justification" style="font-size: 0.78rem; color: #8B949E; margin-top: 10px; line-height: 1.5;"></div>
      </div>
      <div class="card">
        <h2>🔍 논증망 요약</h2>
        <div id="graph-sum" style="font-size: 0.78rem; line-height: 1.5;"></div>
      </div>
      <div class="card">
        <h2 style="margin-bottom:8px">🎨 범례</h2>
        <div style="font-size:0.75rem; display:flex; flex-direction:column; gap:6px;">
          <div style="display:flex; align-items:center; gap:8px;"><span
              style="width:12px; height:12px; border-radius:2px; background:#4A90D9;"></span> Complaint</div>
          <div style="display:flex; align-items:center; gap:8px;"><span
              style="width:12px; height:12px; border-radius:2px; background:#E8923A;"></span> Interrogation</div>
          <div style="display:flex; align-items:center; gap:8px;"><span
              style="width:12px; height:12px; border-radius:2px; background:#5AB56E;"></span> Evidence</div>
          <div style="display:flex; align-items:center; gap:8px;"><span
              style="width:12px; height:12px; border-radius:2px; background:#E74C3C;"></span> 충돌 (Attack)</div>
          <div style="display:flex; align-items:center; gap:8px;"><span
              style="width:12px; height:12px; border-radius:2px; background:#58A6FF; font-size:0.6rem; text-align:center; line-height:12px; color:white;">D</span> 중복 (Duplicate)</div>
        </div>
      </div>
    </aside>

    <div id="graph-wrap">
      <div id="mytimeline"></div>
      <div style="position:absolute;top:10px;right:14px;display:flex;gap:6px;z-index:10;">
        <button id="btn-zoom-in" class="re-upload" style="margin-left:0;">+ 줌인</button>
        <button id="btn-zoom-out" class="re-upload" style="margin-left:0;">− 줌아웃</button>
        <button id="btn-fit" class="re-upload" style="margin-left:0;">전체 보기</button>
      </div>
      <div id="node-detail">항목을 클릭하면 S₀, S₁이 표시됩니다.</div>
    </div>
  </div>

  <script>
    let timeline = null;
    let rawAssembled = [];

    /** 한국어 시점 문자열(t) → Date. "2020년 2월 28일", "2023년 3월 중순경", "불명" 등 */
    function parseLSTDate(t) {
      if (!t || typeof t !== 'string') return new Date(2000, 0, 1);
      const s = t.trim();
      if (s === '불명') return new Date(2000, 0, 1);
      const y = s.match(/(\d{4})년/);
      const m = s.match(/(\d{1,2})월/);
      const d = s.match(/(\d{1,2})일/);
      const year = y ? parseInt(y[1], 10) : 2000;
      const month = m ? parseInt(m[1], 10) - 1 : 0;
      const day = d ? parseInt(d[1], 10) : 1;
      return new Date(year, month, day);
    }

    /** 노드 표시: t 위, (L) E 메인, 중복/충돌 배지 */
    function itemContent(n, dupCount, isConflict) {
      var t = (n.t || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      var L = (n.L || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      var E = (n.E || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      var html = '<div style="font-size:0.75rem;color:#8B949E;margin-bottom:2px;">' + t + '</div>';
      html += '<div style="font-weight:600;">';
      if (isConflict) html += '<span style="color:#E74C3C;">⚠️</span> ';
      html += '(' + L + ') ' + E + '</div>';
      if (dupCount > 1) html += '<div style="font-size:0.65rem;color:#58A6FF;margin-top:2px;">📑 ' + dupCount + '개 문서</div>';
      return html;
    }

    // ── File Loading ──────────────────────────────────────────
    const dropOverlay = document.getElementById('drop-overlay');
    const fileInput = document.getElementById('file-input');

    dropOverlay.addEventListener('dragover', (e) => { e.preventDefault(); dropOverlay.classList.add('dragover'); });
    dropOverlay.addEventListener('dragleave', () => { dropOverlay.classList.remove('dragover'); });
    dropOverlay.addEventListener('drop', (e) => {
      e.preventDefault();
      dropOverlay.classList.remove('dragover');
      handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', (e) => { handleFile(e.target.files[0]); });

    function handleFile(file) {
      if (!file || !file.name.endsWith('.json')) return alert("JSON 파일을 선택해주세요.");
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          initDashboard(data);
        } catch (err) { alert("JSON 파싱 오류: " + err.message); }
      };
      reader.readAsText(file);
    }

    // ── Dashboard Init ────────────────────────────────────────
    function initDashboard(data) {
      dropOverlay.style.display = 'none';
      document.getElementById('main-content').style.visibility = 'visible';

      const aggregated = data.aggregated_graph || {};
      rawAssembled = aggregated.assembled_nodes || [];
      const intent = data.verified_intent || {};

      document.getElementById('run-ts').innerText = "생성: " + (data.run_timestamp || 'N/A').split('.')[0].replace('T', ' ');
      document.getElementById('count-lst').innerText = (data.extracted_lsts_count || 0) + "개";
      document.getElementById('count-nodes').innerText = rawAssembled.length + "개";
      document.getElementById('intent-score').innerText = ((intent.intent_score || 0) * 100).toFixed(1) + "%";
      document.getElementById('intent-type').innerText = intent.intent_type || "N/A";
      document.getElementById('justification').innerText = intent.justification || "";
      document.getElementById('graph-sum').innerText = aggregated.graph_summary || "";

      const scoreBar = document.getElementById('score-bar');
      const scoreVal = intent.intent_score || 0;
      scoreBar.style.width = (scoreVal * 100) + "%";
      scoreBar.style.backgroundColor = scoreVal >= 0.75 ? '#E74C3C' : (scoreVal >= 0.45 ? '#F4D03F' : '#27AE60');

      requestAnimationFrame(() => {
        requestAnimationFrame(() => renderTimeline(rawAssembled));
      });
    }

    // ── vis-timeline 렌더 (중복 Collapse + 충돌 표시) ──
    function renderTimeline(nodes) {
      if (!nodes.length) return;

      // Union-Find: Duplicate 엣지로 연결된 노드를 클러스터링
      var uf = {}, nodeById = {};
      nodes.forEach(function(n) { uf[n.id] = n.id; nodeById[n.id] = n; });
      function ufFind(x) { while (uf[x] !== x) { uf[x] = uf[uf[x]]; x = uf[x]; } return x; }
      function ufUnion(a, b) { uf[ufFind(a)] = ufFind(b); }

      nodes.forEach(function(n) {
        Object.keys(n.argumentative_edges || {}).forEach(function(tid) {
          if (n.argumentative_edges[tid] === 'Duplicate' && nodeById[tid]) ufUnion(n.id, tid);
        });
      });

      var clusters = {};
      nodes.forEach(function(n) {
        var root = ufFind(n.id);
        if (!clusters[root]) clusters[root] = [];
        clusters[root].push(n);
      });

      var clusterMap = {};
      Object.values(clusters).forEach(function(members) {
        members.forEach(function(m) { clusterMap[m.id] = members; });
      });
      window._clusterMap = clusterMap;

      // 대표 노드 (클러스터당 1개)
      var reps = Object.values(clusters).map(function(members) { return members[0]; });
      document.getElementById('count-unique').innerText = reps.length + '개';

      // Attack 엣지가 있는 노드 집합
      var conflictIds = new Set();
      nodes.forEach(function(n) {
        Object.keys(n.argumentative_edges || {}).forEach(function(tid) {
          if (n.argumentative_edges[tid] === 'Attack') { conflictIds.add(n.id); conflictIds.add(tid); }
        });
      });

      // 대표 노드에서 그룹/아이템 생성
      var groupIds = [];
      reps.forEach(function(n) {
        var g = n.doc_source || 'Unknown';
        if (groupIds.indexOf(g) === -1) groupIds.push(g);
      });
      var groups = new vis.DataSet(groupIds.map(function(id, i) { return { id: id, content: id, order: i }; }));

      var items = new vis.DataSet(reps.map(function(n) {
        var members = clusterMap[n.id] || [n];
        var isConflict = members.some(function(m) { return conflictIds.has(m.id); });
        return {
          id: n.id,
          start: parseLSTDate(n.t),
          content: itemContent(n, members.length, isConflict),
          group: n.doc_source || 'Unknown',
          title: n.t + '\n' + (n.L || '') + ' ' + (n.E || ''),
          className: isConflict ? 'conflict-item' : ''
        };
      }));

      var container = document.getElementById('mytimeline');
      if (timeline) timeline.destroy();
      timeline = new vis.Timeline(container, items, groups, {
        width: '100%',
        height: '100%',
        editable: false,
        selectable: true,
        margin: { item: 8, axis: 5 },
        orientation: 'top',
        showCurrentTime: false,
        zoomable: true,
        moveable: true,
        verticalScroll: true,
        zoomKey: '',
        zoomMin: 1000 * 60 * 60 * 24,
        zoomMax: 1000 * 60 * 60 * 24 * 365 * 20,
        groupHeightMode: 'auto',
        stack: true,
        maxHeight: '100%'
      });

      timeline.fit({ animation: { duration: 300 } });

      document.getElementById('btn-zoom-in').onclick = function() { timeline.zoomIn(0.3); };
      document.getElementById('btn-zoom-out').onclick = function() { timeline.zoomOut(0.3); };
      document.getElementById('btn-fit').onclick = function() { timeline.fit({ animation: true }); };

      // 클릭 시 상세 정보: 충돌 정보 + 중복 클러스터 전체 표시
      timeline.on('select', function(sel) {
        var id = sel.items && sel.items[0];
        if (!id) {
          document.getElementById('node-detail').innerHTML = '항목을 클릭하면 상세 정보가 표시됩니다.';
          return;
        }
        var members = window._clusterMap[id] || [];
        if (!members.length) {
          var found = rawAssembled.find(function(x) { return x.id === id; });
          members = found ? [found] : [];
        }
        if (!members.length) return;

        var esc = function(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); };
        var html = '';

        // 충돌(Attack) 정보
        var attacks = [];
        members.forEach(function(m) {
          Object.keys(m.argumentative_edges || {}).forEach(function(tid) {
            if (m.argumentative_edges[tid] === 'Attack') {
              var target = rawAssembled.find(function(x) { return x.id === tid; });
              if (target) attacks.push({ from: m, to: target });
            }
          });
        });

        if (attacks.length > 0) {
          html += '<div class="conflict-alert">⚠️ 논증 충돌 감지 (' + attacks.length + '건)</div>';
          attacks.forEach(function(a) {
            html += '<div class="conflict-detail">'
              + '<b>' + esc(a.from.doc_source) + '</b>: ' + esc(a.from.E)
              + ' <span style="color:#E74C3C;font-weight:600;"> ↔ 반박 </span> '
              + '<b>' + esc(a.to.doc_source) + '</b>: ' + esc(a.to.E)
              + ' <span class="status-badge badge-' + a.to.v_status + '">' + a.to.v_status + '</span>'
              + '</div>';
          });
        }

        // 중복 클러스터 헤더
        if (members.length > 1) {
          html += '<div style="font-size:0.78rem;color:#58A6FF;font-weight:600;margin:8px 0;">📑 동일 사건 — ' + members.length + '개 문서에서 확인</div>';
        }

        // 각 멤버 상세
        members.forEach(function(n) {
          var border = members.length > 1 ? 'border-left:3px solid #30363D;padding-left:10px;margin-bottom:10px;' : '';
          html += '<div class="detail-section" style="' + border + '">';
          if (members.length > 1) {
            html += '<div style="font-size:0.7rem;color:#58A6FF;margin-bottom:4px;">[' + esc(n.doc_source) + '] '
              + '<span class="status-badge badge-' + n.v_status + '">' + n.v_status + '</span></div>';
          }
          html += '<div class="detail-label">S₀</div><div class="detail-text">' + esc(n.S0) + '</div>';
          html += '<div class="detail-label" style="margin-top:6px;">S₁</div><div class="detail-text">' + esc(n.S1) + '</div>';
          html += '</div>';
        });

        document.getElementById('node-detail').innerHTML = html;
      });
    }
  </script>
</body>

</html>
